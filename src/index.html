<!DOCTYPE html>
<html style="background: transparent; margin: 0; padding: 0;">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── Setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ── Skeleton ────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPose(a, b, t) {
  const r = {};
  for (const k of Object.keys(a)) r[k] = { x: lerp(a[k].x, b[k].x, t), y: lerp(a[k].y, b[k].y, t) };
  return r;
}

function p(hd,nk,hp,ls,rs,le,re,lh,rh,lhp,rhp,lk,rk,lf,rf) {
  return {head:hd,neck:nk,hip:hp,lsh:ls,rsh:rs,lel:le,rel:re,lh,rh,lhip:lhp,rhip:rhp,lk,rk,lf,rf};
}

const IDLE = p(
  {x:0,y:-48},{x:0,y:-36},{x:0,y:0},
  {x:-8,y:-33},{x:8,y:-33},{x:-14,y:-18},{x:14,y:-18},
  {x:-12,y:-4},{x:12,y:-4},{x:-5,y:2},{x:5,y:2},
  {x:-8,y:22},{x:8,y:22},{x:-10,y:44},{x:10,y:44}
);

const WALK = [
  p(
    {x:6,y:-45},{x:5,y:-33},{x:0,y:3},
    {x:-5,y:-30},{x:12,y:-30},{x:6,y:-16},{x:-4,y:-18},
    {x:10,y:-4},{x:-10,y:-6},{x:-4,y:4},{x:5,y:5},
    {x:-14,y:20},{x:16,y:24},{x:-8,y:44},{x:22,y:44}
  ),
  p(
    {x:3,y:-50},{x:2,y:-38},{x:0,y:-2},
    {x:-8,y:-35},{x:8,y:-35},{x:-4,y:-20},{x:4,y:-20},
    {x:-2,y:-6},{x:2,y:-6},{x:-3,y:0},{x:3,y:0},
    {x:-2,y:20},{x:2,y:20},{x:-2,y:44},{x:2,y:44}
  ),
  p(
    {x:6,y:-45},{x:5,y:-33},{x:0,y:3},
    {x:-5,y:-30},{x:12,y:-30},{x:-4,y:-18},{x:6,y:-16},
    {x:-10,y:-6},{x:10,y:-4},{x:-4,y:5},{x:5,y:4},
    {x:16,y:24},{x:-14,y:20},{x:22,y:44},{x:-8,y:44}
  ),
  p(
    {x:3,y:-50},{x:2,y:-38},{x:0,y:-2},
    {x:-8,y:-35},{x:8,y:-35},{x:4,y:-20},{x:-4,y:-20},
    {x:2,y:-6},{x:-2,y:-6},{x:-3,y:0},{x:3,y:0},
    {x:2,y:20},{x:-2,y:20},{x:2,y:44},{x:-2,y:44}
  ),
];

const JUMP_RISE = p(
  {x:0,y:-54},{x:0,y:-42},{x:0,y:0},
  {x:-8,y:-39},{x:8,y:-39},{x:-16,y:-48},{x:16,y:-48},
  {x:-22,y:-56},{x:22,y:-56},{x:-5,y:2},{x:5,y:2},
  {x:-10,y:14},{x:10,y:14},{x:-6,y:28},{x:6,y:28}
);

const JUMP_FALL = p(
  {x:0,y:-46},{x:0,y:-34},{x:0,y:0},
  {x:-8,y:-31},{x:8,y:-31},{x:-18,y:-24},{x:18,y:-24},
  {x:-24,y:-16},{x:24,y:-16},{x:-5,y:2},{x:5,y:2},
  {x:-8,y:12},{x:8,y:12},{x:-14,y:28},{x:14,y:28}
);

const LAND = p(
  {x:0,y:-36},{x:0,y:-26},{x:0,y:6},
  {x:-8,y:-23},{x:8,y:-23},{x:-16,y:-12},{x:16,y:-12},
  {x:-18,y:-2},{x:18,y:-2},{x:-6,y:8},{x:6,y:8},
  {x:-16,y:24},{x:16,y:24},{x:-18,y:44},{x:18,y:44}
);

// ── Game Constants ──────────────────────────────────────────────────
const GRAV = 800;
const JUMP_V = 300;
const ACCEL = 800;
const FRIC = 0.88;
const MAXV = 250;
const SCALE = 0.35;
// lineHeight is declared above in terminal metrics section

let DEBUG_DRAW = true; // show platform bounding boxes (togglable with B key)

// ── Terminal metrics (updated dynamically from backend) ─────────────
let textOffsetX = 0;   // text area left offset within window (px)
let textOffsetY = 28;  // text area top offset within window (px) - initial estimate
let textHeight = 0;    // visible text area height (px)
let textWidth = 0;     // visible text area width (px)
let lineHeight = 16;   // computed: textHeight / visibleLines

// ── Platforms ───────────────────────────────────────────────────────
// Each platform: { y: screenY, x: screenX, w: width in px }
// One-way: stick man passes through from below, lands from above.
let platforms = [];

function rebuildFromContent(content) {
  // content: { text_offset_x, text_offset_y, text_height, text_width, lines: [displayWidth...], hashes: [u32...] }
  textOffsetX = content.text_offset_x;
  textOffsetY = content.text_offset_y;
  textHeight = content.text_height;
  textWidth = content.text_width;
  const lines = content.lines;
  const hashes = content.hashes || [];
  const numVisible = lines.length;
  if (numVisible === 0) return;

  // Compute line height from visible area / visible lines
  lineHeight = textHeight / numVisible;

  // Terminal columns = max display width of any line
  // charWidth = text area width / columns
  const termCols = Math.max(...lines, 1);
  const charWidth = textWidth / termCols;

  // Build platforms: each visible line gets a platform
  platforms = [];
  for (let i = 0; i < numVisible; i++) {
    const cols = lines[i]; // display width in columns
    if (cols > 0) {
      const y = textOffsetY + i * lineHeight;
      platforms.push({ y, x: textOffsetX, w: cols * charWidth, hash: hashes[i] || 0 });
    }
  }
}

// Start with fallback platforms until backend sends real data
function initFallbackPlatforms() {
  platforms = [];
  const numLines = Math.floor(H() / lineHeight);
  for (let i = 0; i < numLines; i++) {
    const chars = 20 + Math.floor(Math.random() * 60);
    platforms.push({ y: i * lineHeight, x: 10, w: chars * 8.4, hash: Math.random() * 0xFFFFFF | 0 });
  }
}
initFallbackPlatforms();
window.addEventListener('resize', initFallbackPlatforms);

let gotRealData = false;

// Listen for real terminal content from backend
if (window.__TAURI__) {
  window.__TAURI__.event.listen('terminal-content', (ev) => {
    const content = ev.payload;
    if (content && Array.isArray(content.lines) && content.lines.length > 0) {
      gotRealData = true;
      rebuildFromContent(content);
    }
  });
}

// Find the nearest platform at or below feetScreenY that the stick man is horizontally on
// Always returns the ground floor if nothing else matches
function findFloor(feetScreenY, xPos) {
  let best = null;
  for (const p of platforms) {
    if (p.y >= feetScreenY - 2 && (best === null || p.y < best.y)) {
      if (xPos >= p.x && xPos <= p.x + p.w) {
        best = p;
      }
    }
  }
  // Ground floor: always present at bottom
  const groundY = H() - 4;
  if (groundY >= feetScreenY - 2 && (best === null || groundY < best.y)) {
    best = { y: groundY, x: 0, w: W() };
  }
  return best;
}

// Find the nearest platform ABOVE the current position (for lasso)
// Lasso doesn't require horizontal alignment — it can reach any platform above
function findPlatformAbove(feetScreenY, xPos, maxDist) {
  let best = null;
  for (const p of platforms) {
    if (p.y < feetScreenY - 2 && feetScreenY - p.y <= maxDist) {
      if (best === null || p.y > best.y) best = p;
    }
  }
  return best;
}

// ── Game State ──────────────────────────────────────────────────────
// Using screen-Y for feet position directly (0 = top, H() = bottom)
let gx = 200;
let feetY = platforms.length > 0 ? platforms[0].y : H() - lineHeight; // start on lowest platform
let gvx = 0, gvy = 0; // gvy: positive = moving down on screen
let grounded = true, faceR = true;
let walkPh = 0, landT = 0;
let dropThrough = 0; // timer for dropping through platforms
let curPose = JSON.parse(JSON.stringify(IDLE));

// ── Lasso State ─────────────────────────────────────────────────────
let lasso = null; // { targetY, ropeLen, reeling }
const LASSO_LINES = 8; // can reach 8 lines up
const LASSO_SPEED = 600; // pixels per second rope travels
const REEL_SPEED = 200; // pixels per second climbing

const keys = new Set();

// Click overlay → play. Escape → return to terminal. Q → quit.
document.addEventListener('keydown', e => {
  if (window.__TAURI__) {
    if (e.code === 'KeyQ') {
      window.__TAURI__.core.invoke('quit_app').catch(() => {});
      return;
    }
    if (e.code === 'Escape') {
      window.__TAURI__.core.invoke('focus_terminal').catch(() => {});
      return;
    }
  }
  // Toggle platform bounding boxes
  if (e.code === 'KeyB') { DEBUG_DRAW = !DEBUG_DRAW; return; }
  // Lasso: press E to throw
  if (e.code === 'KeyE' && !lasso) {
    const target = findPlatformAbove(feetY, gx, lineHeight * LASSO_LINES);
    if (target !== null) {
      lasso = { targetY: target.y, ropeLen: 0, maxLen: feetY - target.y, reeling: false };
    }
  }
  keys.add(e.code);
});
document.addEventListener('keyup', e => {
  keys.delete(e.code);
  // Release lasso when E is released
  if (e.code === 'KeyE' && lasso && lasso.reeling) {
    lasso = null;
  }
});

let lastTime = performance.now();

function update(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  const left = keys.has('KeyA') || keys.has('ArrowLeft');
  const right = keys.has('KeyD') || keys.has('ArrowRight');
  const jump = keys.has('KeyW') || keys.has('ArrowUp') || keys.has('Space');
  const down = keys.has('KeyS') || keys.has('ArrowDown');

  // Drop-through timer
  if (down && grounded) { dropThrough = 0.15; grounded = false; gvy = 50; }
  if (dropThrough > 0) dropThrough -= dt;

  // ── Lasso update ──────────────────────────────────────────────
  if (lasso) {
    if (!lasso.reeling) {
      // Rope extending toward target
      lasso.ropeLen += LASSO_SPEED * dt;
      if (lasso.ropeLen >= lasso.maxLen) {
        lasso.ropeLen = lasso.maxLen;
        lasso.reeling = true;
      }
    } else {
      // Reeling up: pull stick man toward target platform
      feetY -= REEL_SPEED * dt;
      gvy = 0;
      gvx *= 0.9; // dampen horizontal while climbing
      grounded = false;
      if (feetY <= lasso.targetY) {
        feetY = lasso.targetY;
        grounded = true;
        gvy = 0;
        lasso = null;
      }
    }
  } else {
    // Normal physics (only when not reeling)

    // Horizontal movement
    if (left) { gvx -= ACCEL * dt; faceR = false; }
    if (right) { gvx += ACCEL * dt; faceR = true; }
    if (!left && !right) { gvx *= Math.pow(FRIC, dt * 60); if (Math.abs(gvx) < 1) gvx = 0; }
    gvx = Math.max(-MAXV, Math.min(MAXV, gvx));

    // Jump
    if (jump && grounded) { gvy = -JUMP_V; grounded = false; landT = 0; }

    // Gravity (gvy positive = falling down on screen)
    if (!grounded) gvy += GRAV * dt;

    // Apply velocity
    const prevFeetY = feetY;
    feetY += gvy * dt;

    // Platform collision (one-way, from above only)
    if (gvy >= 0 && dropThrough <= 0) {
      const floor = findFloor(prevFeetY - 1, gx);
      if (floor !== null && feetY >= floor.y && prevFeetY <= floor.y + 4) {
        if (gvy > 100) landT = 0.15;
        feetY = floor.y;
        gvy = 0;
        grounded = true;
      }
    }

    // Absolute floor (never fall off bottom)
    if (feetY > H()) {
      feetY = H() - lineHeight;
      gvy = 0;
      grounded = true;
    }

    // If grounded, check platform still exists beneath (walked off edge)
    if (grounded) {
      const floor = findFloor(feetY - 1, gx);
      if (floor === null || Math.abs(feetY - floor.y) > 2) {
        grounded = false;
      }
    }
  }

  // Horizontal position
  gx += gvx * dt;
  if (gx < -20) gx = W();
  if (gx > W() + 20) gx = -20;

  // ── Pose ──────────────────────────────────────────────────────
  let target;
  if (lasso && lasso.reeling) {
    // Climbing pose: arms up
    target = JUMP_RISE;
  } else if (!grounded) {
    const t = Math.max(0, Math.min(1, (-gvy + JUMP_V) / (JUMP_V * 2)));
    target = lerpPose(JUMP_FALL, JUMP_RISE, t);
  } else if (landT > 0) {
    target = lerpPose(IDLE, LAND, landT / 0.15);
    landT -= dt;
  } else if (Math.abs(gvx) > 5) {
    walkPh += Math.abs(gvx) * dt * 0.008;
    if (walkPh >= 1) walkPh -= 1;
    const n = WALK.length, raw = walkPh * n;
    const i = Math.floor(raw) % n, f = raw - Math.floor(raw);
    target = lerpPose(WALK[i], WALK[(i + 1) % n], f);
  } else {
    target = IDLE;
  }

  curPose = lerpPose(curPose, target, Math.min(1, dt * 12));
}

// ── Draw ────────────────────────────────────────────────────────────
function drawLimb(ax, ay, bx, by) {
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(bx, by);
  ctx.stroke();
}

function render() {
  ctx.clearRect(0, 0, W(), H());

  const ox = gx;
  const oy = feetY; // feet position in screen coords
  const s = SCALE;
  const fl = faceR ? 1 : -1;

  // Joint positions relative to feet (hip is at y=0 in pose, feet at y=44)
  const j = (name) => ({
    x: ox + curPose[name].x * s * fl,
    y: oy + (curPose[name].y - 44) * s  // offset so feet align with feetY
  });

  const head = j('head'), neck = j('neck'), hip = j('hip');
  const lsh = j('lsh'), rsh = j('rsh'), lel = j('lel'), rel = j('rel');
  const lh = j('lh'), rh = j('rh');
  const lhip = j('lhip'), rhip = j('rhip');
  const lk = j('lk'), rk = j('rk'), lf = j('lf'), rf = j('rf');

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // ── Lasso rope ────────────────────────────────────────────────
  if (lasso) {
    const handPos = faceR ? rh : lh;
    const ropeEndY = lasso.reeling
      ? lasso.targetY
      : feetY - lasso.ropeLen;
    ctx.strokeStyle = 'rgba(255, 200, 50, 0.9)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(255, 200, 50, 0.3)';
    ctx.shadowBlur = 4;

    // Draw rope as slight curve
    ctx.beginPath();
    ctx.moveTo(handPos.x, handPos.y);
    const midX = handPos.x + (faceR ? 6 : -6);
    const midY = (handPos.y + ropeEndY) / 2;
    ctx.quadraticCurveTo(midX, midY, gx, ropeEndY);
    ctx.stroke();

    // Hook at the end
    ctx.beginPath();
    ctx.arc(gx, ropeEndY, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 200, 50, 0.9)';
    ctx.fill();

    ctx.shadowBlur = 0;
  }

  // ── Stick man ─────────────────────────────────────────────────
  ctx.shadowColor = 'rgba(0, 220, 255, 0.4)';
  ctx.shadowBlur = 6;

  const color = 'rgba(0, 220, 255, 0.95)';
  ctx.strokeStyle = color;

  // Spine
  ctx.lineWidth = 2;
  drawLimb(neck.x, neck.y, hip.x, hip.y);

  // Shoulders
  ctx.lineWidth = 1.5;
  drawLimb(lsh.x, lsh.y, rsh.x, rsh.y);

  // Limbs
  ctx.lineWidth = 1.5;
  drawLimb(lsh.x, lsh.y, lel.x, lel.y);
  drawLimb(lel.x, lel.y, lh.x, lh.y);
  drawLimb(rsh.x, rsh.y, rel.x, rel.y);
  drawLimb(rel.x, rel.y, rh.x, rh.y);

  drawLimb(lhip.x, lhip.y, lk.x, lk.y);
  drawLimb(lk.x, lk.y, lf.x, lf.y);
  drawLimb(rhip.x, rhip.y, rk.x, rk.y);
  drawLimb(rk.x, rk.y, rf.x, rf.y);

  // Head
  const hr = 5 * s;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(head.x, head.y, hr, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;

  // Debug: overlay border
  ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, W() - 2, H() - 2);

  // Debug: show computed metrics
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.font = '11px monospace';
  const dbg = `offX:${textOffsetX.toFixed(0)} offY:${textOffsetY.toFixed(0)} tH:${textHeight.toFixed(0)} tW:${textWidth.toFixed(0)} lH:${lineHeight.toFixed(1)} lines:${platforms.length} real:${gotRealData}`;
  ctx.fillText(dbg, 10, 14);

  // Debug: draw text area outline
  ctx.strokeStyle = 'rgba(0, 255, 0, 0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(textOffsetX, textOffsetY, textWidth, textHeight);

  // ── Debug: draw platform bounding boxes ───────────────────────
  if (DEBUG_DRAW) {
    // Color from content hash: same text content = same color
    function hashToColor(h) {
      const r = ((h >> 0) & 0xFF);
      const g = ((h >> 8) & 0xFF);
      const b = ((h >> 16) & 0xFF);
      // Ensure minimum brightness for visibility
      return [Math.max(r, 100), Math.max(g, 100), Math.max(b, 100)];
    }
    for (const p of platforms) {
      const c = hashToColor(p.hash || 0);
      ctx.strokeStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, 0.7)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(p.x, p.y, p.w, lineHeight);
    }
  }
}

function loop(now) {
  update(now);
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
