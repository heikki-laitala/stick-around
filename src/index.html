<!DOCTYPE html>
<html style="background: transparent; margin: 0; padding: 0;">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── Setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ── Skeleton ────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPose(a, b, t) {
  const r = {};
  for (const k of Object.keys(a)) r[k] = { x: lerp(a[k].x, b[k].x, t), y: lerp(a[k].y, b[k].y, t) };
  return r;
}

function p(hd,nk,hp,ls,rs,le,re,lh,rh,lhp,rhp,lk,rk,lf,rf) {
  return {head:hd,neck:nk,hip:hp,lsh:ls,rsh:rs,lel:le,rel:re,lh,rh,lhip:lhp,rhip:rhp,lk,rk,lf,rf};
}

const IDLE = p(
  {x:0,y:-48},{x:0,y:-36},{x:0,y:0},
  {x:-8,y:-33},{x:8,y:-33},{x:-14,y:-18},{x:14,y:-18},
  {x:-12,y:-4},{x:12,y:-4},{x:-5,y:2},{x:5,y:2},
  {x:-8,y:22},{x:8,y:22},{x:-10,y:44},{x:10,y:44}
);

const WALK = [
  p(
    {x:6,y:-45},{x:5,y:-33},{x:0,y:3},
    {x:-5,y:-30},{x:12,y:-30},{x:6,y:-16},{x:-4,y:-18},
    {x:10,y:-4},{x:-10,y:-6},{x:-4,y:4},{x:5,y:5},
    {x:-14,y:20},{x:16,y:24},{x:-8,y:44},{x:22,y:44}
  ),
  p(
    {x:3,y:-50},{x:2,y:-38},{x:0,y:-2},
    {x:-8,y:-35},{x:8,y:-35},{x:-4,y:-20},{x:4,y:-20},
    {x:-2,y:-6},{x:2,y:-6},{x:-3,y:0},{x:3,y:0},
    {x:-2,y:20},{x:2,y:20},{x:-2,y:44},{x:2,y:44}
  ),
  p(
    {x:6,y:-45},{x:5,y:-33},{x:0,y:3},
    {x:-5,y:-30},{x:12,y:-30},{x:-4,y:-18},{x:6,y:-16},
    {x:-10,y:-6},{x:10,y:-4},{x:-4,y:5},{x:5,y:4},
    {x:16,y:24},{x:-14,y:20},{x:22,y:44},{x:-8,y:44}
  ),
  p(
    {x:3,y:-50},{x:2,y:-38},{x:0,y:-2},
    {x:-8,y:-35},{x:8,y:-35},{x:4,y:-20},{x:-4,y:-20},
    {x:2,y:-6},{x:-2,y:-6},{x:-3,y:0},{x:3,y:0},
    {x:2,y:20},{x:-2,y:20},{x:2,y:44},{x:-2,y:44}
  ),
];

const JUMP_RISE = p(
  {x:0,y:-54},{x:0,y:-42},{x:0,y:0},
  {x:-8,y:-39},{x:8,y:-39},{x:-16,y:-48},{x:16,y:-48},
  {x:-22,y:-56},{x:22,y:-56},{x:-5,y:2},{x:5,y:2},
  {x:-10,y:14},{x:10,y:14},{x:-6,y:28},{x:6,y:28}
);

const JUMP_FALL = p(
  {x:0,y:-46},{x:0,y:-34},{x:0,y:0},
  {x:-8,y:-31},{x:8,y:-31},{x:-18,y:-24},{x:18,y:-24},
  {x:-24,y:-16},{x:24,y:-16},{x:-5,y:2},{x:5,y:2},
  {x:-8,y:12},{x:8,y:12},{x:-14,y:28},{x:14,y:28}
);

const LAND = p(
  {x:0,y:-36},{x:0,y:-26},{x:0,y:6},
  {x:-8,y:-23},{x:8,y:-23},{x:-16,y:-12},{x:16,y:-12},
  {x:-18,y:-2},{x:18,y:-2},{x:-6,y:8},{x:6,y:8},
  {x:-16,y:24},{x:16,y:24},{x:-18,y:44},{x:18,y:44}
);

// ── Game Constants ──────────────────────────────────────────────────
const GRAV = 800;
const JUMP_V = 300;
const ACCEL = 800;
const FRIC = 0.88;
const MAXV = 250;
const SCALE = 0.35;
// lineHeight is declared above in terminal metrics section

let DEBUG_DRAW = false; // toggle all debug visuals with B key

// ── Terminal metrics (updated dynamically from backend) ─────────────
let textOffsetX = 0;   // text area left offset within window (px)
let textOffsetY = 28;  // text area top offset within window (px) - initial estimate
let textHeight = 0;    // visible text area height (px)
let textWidth = 0;     // visible text area width (px)
let lineHeight = 16;   // computed: textHeight / visibleLines

// ── Platforms ───────────────────────────────────────────────────────
// Each platform: { y: screenY, x: screenX, w: width in px }
// One-way: stick man passes through from below, lands from above.
let platforms = [];
let promptArea = null; // { x, y, w, h } bounding box of detected input/prompt field
let footerArea = null; // { x, y, w, h } bounding box of detected footer
let lastDebugLines = []; // debug: last few terminal lines from backend
let lastInputLine = null; // debug: detected input_line value
let lastFooterLine = null; // debug: detected footer_line value
// Cached prompt position — used as fallback when detection fails for one poll
let cachedInputIdx = null;
let cachedFooterIdx = null;

function rebuildFromContent(content) {
  // content: { text_offset_x, text_offset_y, text_height, text_width, lines: [displayWidth...], hashes: [u32...] }
  textOffsetX = content.text_offset_x;
  textOffsetY = content.text_offset_y;
  textHeight = content.text_height;
  textWidth = content.text_width;
  const lines = content.lines;
  const hashes = content.hashes || [];
  const numVisible = lines.length;
  lastDebugLines = content.debug_lines || [];
  lastInputLine = content.input_line;
  lastFooterLine = content.footer_line;
  if (numVisible === 0) return;

  // Use terminal dimensions from backend for exact pixel metrics.
  // term_rows from window title is the authoritative row count.
  const termRows = content.term_rows || numVisible;
  const termCols = content.term_cols || Math.max(...lines, 1);
  lineHeight = textHeight / termRows;
  const charWidth = textWidth / termCols;
  const topPad = 0;
  const fitLines = termRows;

  // Build platforms: each visible line gets a platform.
  // Skip lines at or below the prompt area (prompt + footer have no walkable content).
  // Clamp indices to fitLines since API may return more lines than terminal rows.
  let inputIdx = content.input_line; // top border of prompt box
  let footerIdx = content.footer_line; // first line after bottom border

  // Cache prompt position when detected; use as fallback when detection fails
  if (inputIdx != null && footerIdx != null) {
    cachedInputIdx = inputIdx;
    cachedFooterIdx = footerIdx;
  } else if (cachedInputIdx != null) {
    // Detection failed — use cached indices
    if (inputIdx == null) inputIdx = cachedInputIdx;
    if (footerIdx == null) footerIdx = cachedFooterIdx;
  }

  if (inputIdx != null && inputIdx >= fitLines) inputIdx = fitLines - 1;
  if (footerIdx != null && footerIdx >= fitLines) footerIdx = fitLines;
  if (inputIdx != null && inputIdx < 0) inputIdx = 0;
  if (footerIdx != null && footerIdx < 0) footerIdx = 0;
  const lastPlatLine = inputIdx != null ? inputIdx - 1 : fitLines - 1;
  platforms = [];
  for (let i = 0; i <= lastPlatLine && i < fitLines; i++) {
    const cols = lines[i]; // display width in columns
    if (cols > 0) {
      const y = textOffsetY + topPad + i * lineHeight;
      platforms.push({ y, x: textOffsetX, w: cols * charWidth, hash: hashes[i] || 0 });
    }
  }
  // Add prompt top border as a walkable platform (full width)
  if (inputIdx != null) {
    const promptPlatY = textOffsetY + topPad + inputIdx * lineHeight + 2;
    platforms.push({ y: promptPlatY, x: textOffsetX, w: textWidth, hash: 0xFFFF });
  }

  // Store prompt area bounding box (from top border to bottom border inclusive)
  // Nudge inward: top border char sits mid-cell (+1px), bottom border similar (-2px)
  if (inputIdx != null) {
    const promptY = textOffsetY + topPad + inputIdx * lineHeight + 2;
    const promptLines = footerIdx != null ? footerIdx - inputIdx : fitLines - inputIdx;
    promptArea = {
      x: textOffsetX,
      y: promptY,
      w: textWidth,
      h: promptLines * lineHeight - 9,
    };
  } else {
    promptArea = null;
  }
  // Store footer area bounding box — starts where prompt bottom edge ends
  if (footerIdx != null && promptArea) {
    const footerY = promptArea.y + promptArea.h;
    const footerBottom = textOffsetY + topPad + fitLines * lineHeight;
    footerArea = {
      x: textOffsetX,
      y: footerY,
      w: textWidth,
      h: footerBottom - footerY,
    };
  } else if (footerIdx != null) {
    const footerY = textOffsetY + topPad + footerIdx * lineHeight;
    const footerLines = fitLines - footerIdx;
    footerArea = {
      x: textOffsetX,
      y: footerY,
      w: textWidth,
      h: footerLines * lineHeight,
    };
  } else {
    footerArea = null;
  }

  // Spawn man at terminal right edge, standing on top of the prompt box.
  // Wait for both separators to be detected (prompt + footer) for correct position.
  if (!hasSpawned && promptArea && footerArea) {
    gx = textOffsetX + textWidth - 20 * SCALE - 20;
    feetY = promptArea.y;
    faceR = false; // face left toward terminal text
    hasSpawned = true;
  } else if (hasSpawned && grounded && platforms.length > 0) {
    // When platforms rebuild (terminal text changed), follow the platform we're standing on.
    // First try to find the same platform by content hash — this handles text scrolling
    // so the man moves with the platform as lines shift up/down.
    let matched = null;
    if (standingHash !== 0) {
      let matchDist = Infinity;
      for (const p of platforms) {
        if (p.hash === standingHash && gx >= p.x - 10 && gx <= p.x + p.w + 10) {
          const dist = Math.abs(p.y - feetY);
          if (dist < matchDist) {
            matched = p;
            matchDist = dist;
          }
        }
      }
    }
    if (matched) {
      feetY = matched.y;
    } else {
      // Fallback: snap to nearest platform by distance
      let nearest = null, nearestDist = Infinity;
      for (const p of platforms) {
        const dist = Math.abs(p.y - feetY);
        if (dist < nearestDist && gx >= p.x - 10 && gx <= p.x + p.w + 10) {
          nearest = p;
          nearestDist = dist;
        }
      }
      if (nearest && nearestDist < lineHeight * 2) {
        feetY = nearest.y;
        standingHash = nearest.hash || 0;
      }
    }
  }

  // Break rope if the anchor platform no longer exists.
  // Store the anchor platform's hash to detect content changes.
  if (rope && (rope.state === 'swinging' || rope.state === 'attached')) {
    // Find platform at exact anchor position (within 2px tolerance)
    const anchorPlat = platforms.find(p =>
      rope.hitX >= p.x && rope.hitX <= p.x + p.w &&
      Math.abs(rope.hitY - p.y) < 2
    );
    // Break if platform gone OR its content changed (different text scrolled in)
    if (!anchorPlat || (rope.anchorHash && anchorPlat.hash !== rope.anchorHash)) {
      rope = null;
      grounded = false;
      standingHash = 0;
    }
  }
}

// Start with fallback platforms until backend sends real data
function initFallbackPlatforms() {
  platforms = [];
  const numLines = Math.floor(H() / lineHeight);
  for (let i = 0; i < numLines; i++) {
    const chars = 20 + Math.floor(Math.random() * 60);
    platforms.push({ y: i * lineHeight, x: 10, w: chars * 8.4, hash: Math.random() * 0xFFFFFF | 0 });
  }
}
initFallbackPlatforms();
window.addEventListener('resize', initFallbackPlatforms);

let gotRealData = false;

// Listen for real terminal content from backend
if (window.__TAURI__) {
  window.__TAURI__.event.listen('terminal-content', (ev) => {
    const content = ev.payload;
    if (content && Array.isArray(content.lines) && content.lines.length > 0) {
      gotRealData = true;
      rebuildFromContent(content);
    }
  });
}

// Find the nearest platform at or below feetScreenY that the stick man is horizontally on
// Always returns the ground floor if nothing else matches
function findFloor(feetScreenY, xPos) {
  let best = null;
  for (const p of platforms) {
    if (p.y >= feetScreenY - 2 && (best === null || p.y < best.y)) {
      if (xPos >= p.x && xPos <= p.x + p.w) {
        best = p;
      }
    }
  }
  // Ground floor: always present at bottom
  const groundY = H() - 4;
  if (groundY >= feetScreenY - 2 && (best === null || groundY < best.y)) {
    best = { y: groundY, x: 0, w: W() };
  }
  return best;
}

// Find the nearest platform ABOVE the current position (for lasso)
// Lasso doesn't require horizontal alignment — it can reach any platform above
function findPlatformAbove(feetScreenY, xPos, maxDist) {
  let best = null;
  for (const p of platforms) {
    if (p.y < feetScreenY - 2 && feetScreenY - p.y <= maxDist) {
      if (best === null || p.y > best.y) best = p;
    }
  }
  return best;
}

// ── Game State ──────────────────────────────────────────────────────
// Using screen-Y for feet position directly (0 = top, H() = bottom)
let gx = 200;
let feetY = H() - lineHeight;
let hasSpawned = false; // true after first real terminal data positions the man
let gvx = 0, gvy = 0; // gvy: positive = moving down on screen
let grounded = true, faceR = true;
let standingHash = 0; // hash of the platform we're standing on (for scroll tracking)
let walkPh = 0, landT = 0;
let dropThrough = 0; // timer for dropping through platforms
let curPose = JSON.parse(JSON.stringify(IDLE));

// ── Rope State ──────────────────────────────────────────────────────
let rope = null;
// state: 'aiming' | 'flying' | 'swinging'
let ropeAngle = -3 * Math.PI / 4; // default aim: 135° (up-left)
const ROPE_AIM_SPEED = 2.0; // radians per second
const ROPE_FLY_SPEED = 150; // pixels per second (slow for debugging)
const ROPE_MAX_LEN = 400; // max rope length in pixels
const SWING_GRAVITY = 600; // gravity pulling the pendulum
const SWING_PUMP = 3.0; // angular acceleration when pumping with left/right
const SWING_DAMPING = 0.98; // slight energy loss per frame
const ROPE_COOLDOWN = 0.5; // seconds between rope uses
let ropeCooldown = 0;

const keys = new Set();

// Click overlay → play. Escape → return to terminal. Q → quit.
document.addEventListener('keydown', e => {
  if (window.__TAURI__) {
    if (e.code === 'KeyQ') {
      window.__TAURI__.core.invoke('quit_app').catch(() => {});
      return;
    }
    if (e.code === 'Escape') {
      window.__TAURI__.core.invoke('focus_terminal').catch(() => {});
      return;
    }
  }
  // Toggle platform bounding boxes
  if (e.code === 'KeyB') { DEBUG_DRAW = !DEBUG_DRAW; return; }
  // Rope: press E to start aiming, or release while swinging
  if (e.code === 'KeyE') {
    if (!rope && ropeCooldown <= 0) {
      // Default aim direction based on facing: up-left if facing right, up-right if facing left
      const defaultAngle = faceR ? -Math.PI / 4 : -3 * Math.PI / 4;
      ropeAngle = defaultAngle;
      rope = { state: 'aiming', angle: ropeAngle, tipX: 0, tipY: 0,
               hitX: 0, hitY: 0, ropeLen: 0, swingAngle: 0, swingVel: 0 };
    } else if (rope && (rope.state === 'aiming' || rope.state === 'flying')) {
      // Cancel rope
      rope = null;
      ropeCooldown = ROPE_COOLDOWN;
    } else if (rope && rope.state === 'swinging') {
      // Release: launch with current velocity + minimum horizontal push
      const len = rope.ropeLen;
      const tangentVx = -rope.swingVel * len * Math.cos(rope.swingAngle);
      const tangentVy = -rope.swingVel * len * Math.sin(rope.swingAngle);
      // Ensure a minimum horizontal kick in the swing direction
      const MIN_RELEASE_VX = 120;
      const dirX = Math.sin(rope.swingAngle) > 0 ? 1 : -1;
      gvx = Math.abs(tangentVx) > MIN_RELEASE_VX ? tangentVx : dirX * MIN_RELEASE_VX;
      gvy = tangentVy;
      grounded = false;
      standingHash = 0;
      rope = null;
      ropeCooldown = ROPE_COOLDOWN;
    }
  }
  keys.add(e.code);
});
document.addEventListener('keyup', e => {
  keys.delete(e.code);
  // Release E: fire the rope if aiming
  if (e.code === 'KeyE' && rope && rope.state === 'aiming') {
    rope.state = 'flying';
    rope.tipX = gx;
    rope.tipY = feetY - 15 * SCALE;
  }
});

let lastTime = performance.now();

function update(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  const aiming = rope && rope.state === 'aiming';
  const left = !aiming && (keys.has('KeyA') || keys.has('ArrowLeft'));
  const right = !aiming && (keys.has('KeyD') || keys.has('ArrowRight'));
  const jump = !aiming && (keys.has('KeyW') || keys.has('ArrowUp') || keys.has('Space'));
  const down = !aiming && (keys.has('KeyS') || keys.has('ArrowDown'));

  // Drop-through timer (disabled — walk off edges instead)
  if (dropThrough > 0) dropThrough -= dt;

  // ── Rope update ──────────────────────────────────────────────
  if (ropeCooldown > 0) ropeCooldown -= dt;

  if (rope) {
    if (rope.state === 'aiming') {
      // Adjust angle with up/down while aiming
      if (keys.has('ArrowUp') || keys.has('KeyW')) ropeAngle -= ROPE_AIM_SPEED * dt;
      if (keys.has('ArrowDown') || keys.has('KeyS')) ropeAngle += ROPE_AIM_SPEED * dt;
      // Clamp: only upward angles (-170° to -10°)
      ropeAngle = Math.max(-Math.PI * 0.95, Math.min(-Math.PI * 0.05, ropeAngle));
      rope.angle = ropeAngle;
    } else if (rope.state === 'flying') {
      // Move rope tip along angle
      rope.tipX += Math.cos(rope.angle) * ROPE_FLY_SPEED * dt;
      rope.tipY += Math.sin(rope.angle) * ROPE_FLY_SPEED * dt;

      // Simple collision: check if tip is inside any platform bounding box
      let hit = null;
      for (const p of platforms) {
        if (rope.tipX >= p.x && rope.tipX <= p.x + p.w &&
            rope.tipY >= p.y && rope.tipY <= p.y + lineHeight) {
          hit = p;
          break;
        }
      }

      if (hit) {
        rope.state = 'swinging';
        rope.hitX = rope.tipX;
        rope.hitY = hit.y;
        rope.anchorHash = hit.hash; // track content to detect scroll
        rope.ropeLen = Math.max(20, Math.hypot(gx - rope.hitX, feetY - rope.hitY));
        rope.swingAngle = Math.atan2(gx - rope.hitX, feetY - rope.hitY);
        rope.swingVel = (gvx * Math.cos(rope.swingAngle)) / rope.ropeLen;
        rope.swingTime = 0; // grace period before landing check
        rope.startPlatY = feetY; // remember the platform we launched from
        grounded = false;
        standingHash = 0;
      }
      // Cancel if rope goes off screen or exceeds max length
      if (rope.tipX < 0 || rope.tipX > W() || rope.tipY < 0 || rope.tipY > H() ||
          Math.hypot(rope.tipX - gx, rope.tipY - feetY) > ROPE_MAX_LEN) {
        rope = null;
      }
    } else if (rope.state === 'swinging') {
      // Pendulum physics: angle measured from vertical (0 = straight down)
      // Angular acceleration from gravity
      const gravAcc = -(SWING_GRAVITY / rope.ropeLen) * Math.sin(rope.swingAngle);
      rope.swingVel += gravAcc * dt;

      // Player pumping: left/right adds angular velocity
      if (keys.has('KeyA') || keys.has('ArrowLeft')) rope.swingVel -= SWING_PUMP * dt;
      if (keys.has('KeyD') || keys.has('ArrowRight')) rope.swingVel += SWING_PUMP * dt;

      // Climb: W/up shortens rope, S/down lengthens it
      const CLIMB_SPEED = 80; // pixels per second
      const MIN_ROPE_LEN = 20;
      if (keys.has('KeyW') || keys.has('ArrowUp')) rope.ropeLen = Math.max(MIN_ROPE_LEN, rope.ropeLen - CLIMB_SPEED * dt);
      if (keys.has('KeyS') || keys.has('ArrowDown')) rope.ropeLen = Math.min(ROPE_MAX_LEN, rope.ropeLen + CLIMB_SPEED * dt);

      // Damping
      rope.swingVel *= SWING_DAMPING;

      // Update angle
      rope.swingAngle += rope.swingVel * dt;

      // Position man at end of pendulum
      gx = rope.hitX + Math.sin(rope.swingAngle) * rope.ropeLen;
      feetY = rope.hitY + Math.cos(rope.swingAngle) * rope.ropeLen;
      gvy = 0;
      gvx = 0;
      rope.swingTime += dt;

      // Only check for landing after grace period, skip launch platform
      if (rope.swingTime > 0.3) {
        for (const p of platforms) {
          if (Math.abs(p.y - rope.startPlatY) < 2) continue;
          if (feetY >= p.y && feetY <= p.y + lineHeight * 0.5 &&
              gx >= p.x && gx <= p.x + p.w) {
            feetY = p.y;
            grounded = true;
            gvy = 0;
            gvx = rope.swingVel * rope.ropeLen * 0.3;
            rope = null;
            break;
          }
        }
      }
    }
  }

  if (!rope || rope.state === 'aiming' || rope.state === 'flying') {
    // Normal physics (runs during aiming/flying too so gravity continues)

    // Horizontal movement
    if (left) { gvx -= ACCEL * dt; faceR = false; }
    if (right) { gvx += ACCEL * dt; faceR = true; }
    if (!left && !right) { gvx *= Math.pow(FRIC, dt * 60); if (Math.abs(gvx) < 1) gvx = 0; }
    gvx = Math.max(-MAXV, Math.min(MAXV, gvx));

    // Jump
    if (jump && grounded) { gvy = -JUMP_V; grounded = false; standingHash = 0; landT = 0; }

    // Gravity (gvy positive = falling down on screen)
    if (!grounded) gvy += GRAV * dt;

    // Apply velocity
    const prevFeetY = feetY;
    feetY += gvy * dt;

    // Platform collision (one-way, from above only)
    if (gvy >= 0 && dropThrough <= 0) {
      const floor = findFloor(prevFeetY - 1, gx);
      if (floor !== null && feetY >= floor.y && prevFeetY <= floor.y + 4) {
        if (gvy > 100) landT = 0.15;
        feetY = floor.y;
        gvy = 0;
        grounded = true;
        standingHash = floor.hash || 0;
      }
    }

    // Absolute floor (never fall off bottom)
    if (feetY > H()) {
      feetY = H() - lineHeight;
      gvy = 0;
      standingHash = 0;
      grounded = true;
    }

    // If grounded, check platform still exists beneath (walked off edge)
    if (grounded) {
      const floor = findFloor(feetY - 1, gx);
      if (floor === null || Math.abs(feetY - floor.y) > 2) {
        grounded = false;
        standingHash = 0;
      } else {
        standingHash = floor.hash || 0;
      }
    }
  }

  // Horizontal position
  gx += gvx * dt;
  if (gx < -20) gx = W();
  if (gx > W() + 20) gx = -20;

  // ── Pose ──────────────────────────────────────────────────────
  let target;
  if (rope && rope.state === 'swinging') {
    // Climbing pose: arms up
    target = JUMP_RISE;
  } else if (!grounded) {
    const t = Math.max(0, Math.min(1, (-gvy + JUMP_V) / (JUMP_V * 2)));
    target = lerpPose(JUMP_FALL, JUMP_RISE, t);
  } else if (landT > 0) {
    target = lerpPose(IDLE, LAND, landT / 0.15);
    landT -= dt;
  } else if (Math.abs(gvx) > 5) {
    walkPh += Math.abs(gvx) * dt * 0.008;
    if (walkPh >= 1) walkPh -= 1;
    const n = WALK.length, raw = walkPh * n;
    const i = Math.floor(raw) % n, f = raw - Math.floor(raw);
    target = lerpPose(WALK[i], WALK[(i + 1) % n], f);
  } else {
    target = IDLE;
  }

  curPose = lerpPose(curPose, target, Math.min(1, dt * 12));
}

// ── Draw ────────────────────────────────────────────────────────────
function drawLimb(ax, ay, bx, by) {
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(bx, by);
  ctx.stroke();
}

function render() {
  ctx.clearRect(0, 0, W(), H());

  if (!hasSpawned) {
    // Only draw debug overlays before spawn
    renderDebugOverlays();
    return;
  }

  const ox = gx;
  const oy = feetY; // feet position in screen coords
  const s = SCALE;
  const fl = faceR ? 1 : -1;

  // Joint positions relative to feet (hip is at y=0 in pose, feet at y=44)
  const j = (name) => ({
    x: ox + curPose[name].x * s * fl,
    y: oy + (curPose[name].y - 44) * s  // offset so feet align with feetY
  });

  const head = j('head'), neck = j('neck'), hip = j('hip');
  const lsh = j('lsh'), rsh = j('rsh'), lel = j('lel'), rel = j('rel');
  const lh = j('lh'), rh = j('rh');
  const lhip = j('lhip'), rhip = j('rhip');
  const lk = j('lk'), rk = j('rk'), lf = j('lf'), rf = j('rf');

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // ── Rope ─────────────────────────────────────────────────────
  if (rope) {
    const handPos = faceR ? rh : lh;
    ctx.strokeStyle = 'rgba(255, 200, 50, 0.9)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(255, 200, 50, 0.3)';
    ctx.shadowBlur = 4;

    if (rope.state === 'aiming') {
      // Draw aim line
      const aimLen = 40;
      const endX = handPos.x + Math.cos(rope.angle) * aimLen;
      const endY = handPos.y + Math.sin(rope.angle) * aimLen;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(handPos.x, handPos.y);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      ctx.setLineDash([]);
      // Arrowhead
      ctx.beginPath();
      ctx.arc(endX, endY, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 200, 50, 0.9)';
      ctx.fill();
    } else if (rope.state === 'flying') {
      if (DEBUG_DRAW) {
        // Debug: draw every 4th platform bounding box
        for (let i = 0; i < platforms.length; i += 4) {
          const p = platforms[i];
          ctx.fillStyle = 'rgba(255, 0, 0, 0.15)';
          ctx.fillRect(p.x, p.y, p.w, lineHeight);
        }
      }
      // Draw rope from hand to flying tip
      ctx.strokeStyle = 'rgba(255, 200, 50, 0.9)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(handPos.x, handPos.y);
      ctx.lineTo(rope.tipX, rope.tipY);
      ctx.stroke();
      // Hook
      ctx.beginPath();
      ctx.arc(rope.tipX, rope.tipY, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 200, 50, 0.9)';
      ctx.fill();
    } else if (rope.state === 'swinging') {
      // Draw taut rope from hand to anchor point
      ctx.beginPath();
      ctx.moveTo(handPos.x, handPos.y);
      ctx.lineTo(rope.hitX, rope.hitY);
      ctx.stroke();
      // Hook at anchor
      ctx.beginPath();
      ctx.arc(rope.hitX, rope.hitY, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 200, 50, 0.9)';
      ctx.fill();
    }

    ctx.shadowBlur = 0;
  }

  // ── Stick man ─────────────────────────────────────────────────
  ctx.shadowColor = 'rgba(0, 220, 255, 0.4)';
  ctx.shadowBlur = 6;

  const color = 'rgba(0, 220, 255, 0.95)';
  ctx.strokeStyle = color;

  // Spine
  ctx.lineWidth = 2;
  drawLimb(neck.x, neck.y, hip.x, hip.y);

  // Shoulders
  ctx.lineWidth = 1.5;
  drawLimb(lsh.x, lsh.y, rsh.x, rsh.y);

  // Limbs
  ctx.lineWidth = 1.5;
  drawLimb(lsh.x, lsh.y, lel.x, lel.y);
  drawLimb(lel.x, lel.y, lh.x, lh.y);
  drawLimb(rsh.x, rsh.y, rel.x, rel.y);
  drawLimb(rel.x, rel.y, rh.x, rh.y);

  drawLimb(lhip.x, lhip.y, lk.x, lk.y);
  drawLimb(lk.x, lk.y, lf.x, lf.y);
  drawLimb(rhip.x, rhip.y, rk.x, rk.y);
  drawLimb(rk.x, rk.y, rf.x, rf.y);

  // Head
  const hr = 5 * s;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(head.x, head.y, hr, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;

  if (DEBUG_DRAW) renderDebugOverlays();
}

function renderDebugOverlays() {
  // ── Footer area (drawn in green) ───────────────────────────
  if (footerArea) {
    ctx.fillStyle = 'rgba(0, 200, 50, 0.15)';
    ctx.fillRect(footerArea.x, footerArea.y, footerArea.w, footerArea.h);
    ctx.strokeStyle = 'rgba(0, 200, 50, 0.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(footerArea.x, footerArea.y, footerArea.w, footerArea.h);
    ctx.fillStyle = 'rgba(0, 200, 50, 0.9)';
    ctx.font = '10px monospace';
    ctx.fillText('FOOTER', footerArea.x + 4, footerArea.y + 12);
  }
  // ── Prompt area (drawn in blue) ───────────────────────────
  if (promptArea) {
    ctx.fillStyle = 'rgba(0, 100, 255, 0.15)';
    ctx.fillRect(promptArea.x, promptArea.y, promptArea.w, promptArea.h);
    ctx.strokeStyle = 'rgba(0, 100, 255, 0.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(promptArea.x, promptArea.y, promptArea.w, promptArea.h);
    ctx.fillStyle = 'rgba(0, 100, 255, 0.9)';
    ctx.font = '10px monospace';
    ctx.fillText('PROMPT', promptArea.x + 4, promptArea.y + 12);
  }
  if (!footerArea && !promptArea) {
    ctx.fillStyle = 'rgba(255, 50, 50, 0.9)';
    ctx.font = '12px monospace';
    ctx.fillText('NO PROMPT DETECTED', 10, H() - 10);
  }
  // Always show debug lines from backend
  if (lastDebugLines && lastDebugLines.length > 0) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    const dbgH = lastDebugLines.length * 14 + 20;
    ctx.fillRect(0, 0, 600, dbgH);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.font = '11px monospace';
    ctx.fillText(`footer: ${lastFooterLine}  input: ${lastInputLine}`, 10, 14);
    for (let i = 0; i < lastDebugLines.length; i++) {
      ctx.fillText(lastDebugLines[i], 10, 28 + i * 14);
    }
  }
}

function loop(now) {
  if (hasSpawned) update(now);
  else lastTime = now; // keep time current so first dt isn't huge
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
