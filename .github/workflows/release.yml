name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify plugin.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PJV=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' .claude-plugin/plugin.json | head -n1)
          [ "$TAG" = "$PJV" ] || { echo "tag $GITHUB_REF_NAME requires plugin.json version $TAG, got $PJV"; exit 1; }

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master-history pin (toolchain set below; per upstream README)
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Build release binary
        run: make build

      - name: Symlink binary at repo root
        run: make link-dev

      - name: Ad-hoc codesign
        run: codesign --force --sign - ./stick-around

      - name: Package binary
        # -h dereferences the link-dev symlink at the repo root so the
        # archive contains the actual binary, not a broken symlink to
        # src-tauri/target/release/stick-around.
        run: |
          tar -czhf stick-around-macos-arm64.tar.gz stick-around
          shasum -a 256 stick-around-macos-arm64.tar.gz > stick-around-macos-arm64.tar.gz.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            stick-around-macos-arm64.tar.gz
            stick-around-macos-arm64.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify plugin.json version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PJV=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' .claude-plugin/plugin.json | head -n1)
          [ "$TAG" = "$PJV" ] || { echo "tag $GITHUB_REF_NAME requires plugin.json version $TAG, got $PJV"; exit 1; }

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master-history pin (toolchain set below; per upstream README)
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Build release binary
        run: make build

      - name: Symlink binary at repo root
        run: make link-dev

      - name: Package binary
        # -h dereferences the link-dev symlink at the repo root so the
        # archive contains the actual binary, not a broken symlink to
        # src-tauri/target/release/stick-around.
        run: |
          tar -czhf stick-around-linux-x86_64.tar.gz stick-around
          sha256sum stick-around-linux-x86_64.tar.gz > stick-around-linux-x86_64.tar.gz.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            stick-around-linux-x86_64.tar.gz
            stick-around-linux-x86_64.tar.gz.sha256
          fail_on_unmatched_files: true

  build-windows:
    # Pin the OS image label so it can't silently jump to a future
    # Windows Server version. NOTE: this does NOT freeze the build
    # toolchain — the VS toolchain inside the windows-2025 image moves
    # to VS 2026 during the 2026-06-08..15 rollout regardless of this
    # label. Switch to windows-2022 if a release must stay on VS 2022.
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify plugin.json version matches tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v',''
          $line = (Get-Content .claude-plugin/plugin.json | Select-String -Pattern '"version"' | Select-Object -First 1).ToString()
          if ($line -notmatch '"version"\s*:\s*"([^"]+)"') { Write-Error "could not parse version"; exit 1 }
          $pjv = $matches[1]
          if ($tag -ne $pjv) { Write-Error "tag $env:GITHUB_REF_NAME requires plugin.json version $tag, got $pjv"; exit 1 }

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master-history pin (toolchain set below; per upstream README)
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Build release binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Package binary
        shell: pwsh
        run: |
          Copy-Item src-tauri/target/release/stick-around.exe stick-around.exe
          Compress-Archive -Path stick-around.exe -DestinationPath stick-around-windows-x86_64.zip
          $hash = (Get-FileHash stick-around-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  stick-around-windows-x86_64.zip" | Out-File -Encoding ascii stick-around-windows-x86_64.zip.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            stick-around-windows-x86_64.zip
            stick-around-windows-x86_64.zip.sha256
          fail_on_unmatched_files: true
