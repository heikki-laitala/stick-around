name: smoke-test

# End-user install smoke test. Mirrors the documented user flow from
# README.md ("/plugin install" → SessionStart bootstrap → run binary)
# against a published GitHub Release, on all three target platforms.
#
# Triggered:
#   - Manually via workflow_dispatch (optional `version` input to test a
#     specific released tag; defaults to plugin.json's current version).
#   - Automatically after release.yml finishes successfully.
#
# Out of scope: the dev path (`make deps` / `make dev`). Those are
# already covered by ci.yml. This workflow covers the path real users
# take, which neither ci.yml nor release.yml exercise.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to smoke test (e.g. 2026.05.24). Leave blank to test plugin.json's current version on the default branch."
        required: false
        type: string
      extended:
        description: "Run the slow/best-effort extended job (nested GNOME Shell extension load). Default off — adds ~3 min and is environment-dependent, see the gnome-extension-runtime job comments."
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows: [release]
    types: [completed]

permissions:
  contents: read

jobs:
  smoke-test:
    # Manual runs always proceed; auto-runs only after a green release.yml.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: stick-around
          - os: macos-14
            binary: stick-around
          - os: windows-latest
            binary: stick-around.exe
    runs-on: ${{ matrix.os }}
    name: smoke (${{ matrix.os }})

    steps:
      # Resolve which commit to check out. Priority:
      #   1. workflow_dispatch with `version` input → check out `v<version>`
      #      so we test that release's bootstrap script against its own
      #      release assets (newer bootstrap vs. older release assets
      #      would mask real install bugs).
      #   2. workflow_run → check out the SHA the release was tagged from.
      #   3. Fall back to the default branch HEAD.
      - name: Resolve checkout ref
        id: ref
        shell: bash
        run: |
          if [ -n "${{ inputs.version || '' }}" ]; then
            echo "ref=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.workflow_run.head_sha || '' }}" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Resolve version from plugin.json
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' .claude-plugin/plugin.json | head -n1)
          if [ -z "$VERSION" ]; then echo "could not parse version"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing v$VERSION on ${{ matrix.os }}"

      # Tauri runtime libs. We install the -dev metapackages so this
      # tracks release.yml's build environment exactly — if a new
      # system dep gets added there, the same list works here.
      # xvfb is added so the headless runner can host the Tauri window
      # when we launch the binary later.
      - name: Install Tauri runtime deps (Linux)
        if: runner.os == 'Linux'
        # rsync is preinstalled on GitHub-hosted ubuntu-latest, but the
        # catthehacker/ubuntu image used by nektos/act for local
        # workflow runs ships without it. Installing here is a no-op on
        # the hosted runner and lets `act` exercise the staging step.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rsync \
            xvfb

      # Stage a fake CLAUDE_PLUGIN_ROOT at the exact path /plugin install
      # writes to. Bootstrap's safety check refuses to run unless the
      # root path contains `.claude/plugins/cache`, so this is required.
      - name: Stage CLAUDE_PLUGIN_ROOT (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ROOT="$HOME/.claude/plugins/cache/stick-around/stick-around/${{ steps.version.outputs.version }}"
          mkdir -p "$ROOT"
          rsync -a \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'src-tauri/target' \
            ./ "$ROOT/"
          echo "CLAUDE_PLUGIN_ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: Stage CLAUDE_PLUGIN_ROOT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = Join-Path $env:USERPROFILE ".claude\plugins\cache\stick-around\stick-around\${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          # robocopy uses exit codes 0–7 for success; 8+ is failure.
          # We reset $LASTEXITCODE so a successful copy doesn't fail the step.
          robocopy . $root /E /XD .git node_modules "src-tauri\target" /NFL /NDL /NJH /NJS /NP | Out-Null
          if ($LASTEXITCODE -ge 8) { Write-Error "robocopy failed with exit code $LASTEXITCODE"; exit 1 }
          $global:LASTEXITCODE = 0
          "CLAUDE_PLUGIN_ROOT=$root" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      # Private-repo workaround: GitHub's releases/download/<tag>/<asset>
      # URL 404s without auth, and even with auth only the
      # api.github.com/.../assets/<id> form honors the Bearer token. The
      # bootstrap script downloads anonymously by design (real public
      # users won't have a token), so the smoke test installs a wrapper
      # that intercepts curl / Invoke-WebRequest, rewrites the URL, and
      # injects the workflow's GITHUB_TOKEN. The wrapper is smoke-test
      # instrumentation only — bootstrap.sh / bootstrap.ps1 are run
      # unmodified.
      - name: Install curl auth shim (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/curl-shim"
          cat > "$RUNNER_TEMP/curl-shim/curl" <<'SHIM'
          #!/bin/sh
          set -eu
          RC=/usr/bin/curl
          TARGET=""
          for arg in "$@"; do
            case "$arg" in
              https://github.com/*/releases/download/*) TARGET="$arg" ;;
            esac
          done
          if [ -z "$TARGET" ]; then exec "$RC" "$@"; fi
          rest=${TARGET#https://github.com/}
          owner_repo=${rest%%/releases/*}
          tag_and_file=${rest#*/releases/download/}
          tag=${tag_and_file%%/*}
          filename=${tag_and_file#*/}
          asset_id=$("$RC" -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${owner_repo}/releases/tags/${tag}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(next(a['id'] for a in d['assets'] if a['name']=='${filename}'))")
          new_url="https://api.github.com/repos/${owner_repo}/releases/assets/${asset_id}"
          new_args=""
          for arg in "$@"; do
            if [ "$arg" = "$TARGET" ]; then new_args="$new_args $new_url"; else new_args="$new_args $arg"; fi
          done
          # shellcheck disable=SC2086
          exec "$RC" -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/octet-stream" $new_args
          SHIM
          chmod +x "$RUNNER_TEMP/curl-shim/curl"
          echo "$RUNNER_TEMP/curl-shim" >> "$GITHUB_PATH"

      - name: Run bootstrap (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sh "$CLAUDE_PLUGIN_ROOT/scripts/bootstrap.sh"

      # Windows can't PATH-shadow Invoke-WebRequest (it's a cmdlet, not a
      # binary), so the shim is a PowerShell function defined inline and
      # the bootstrap call happens in the same step — function definitions
      # don't survive across separate `run:` invocations.
      - name: Run bootstrap with auth shim (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          function Invoke-WebRequest {
            param(
              [Parameter(Mandatory, Position=0)] [string] $Uri,
              [string] $OutFile,
              [switch] $UseBasicParsing
            )
            if ($Uri -match 'https://github\.com/([^/]+/[^/]+)/releases/download/([^/]+)/(.+)$') {
              $owner_repo = $matches[1]
              $tag        = $matches[2]
              $filename   = $matches[3]
              # The release-info endpoint rejects Accept: application/octet-stream
              # with HTTP 415 ('Must accept application/json'); the asset-download
              # endpoint requires Accept: application/octet-stream to get the
              # binary instead of an HTML page. Keep the two header sets distinct.
              $apiHeaders      = @{Authorization = "Bearer $env:GH_TOKEN"; Accept = 'application/json'}
              $downloadHeaders = @{Authorization = "Bearer $env:GH_TOKEN"; Accept = 'application/octet-stream'}
              $rel        = Microsoft.PowerShell.Utility\Invoke-WebRequest `
                              -Uri "https://api.github.com/repos/$owner_repo/releases/tags/$tag" `
                              -Headers $apiHeaders -UseBasicParsing
              $assets     = ($rel.Content | ConvertFrom-Json).assets
              $asset      = $assets | Where-Object { $_.name -eq $filename }
              $newUri     = "https://api.github.com/repos/$owner_repo/releases/assets/$($asset.id)"
              Microsoft.PowerShell.Utility\Invoke-WebRequest -Uri $newUri -OutFile $OutFile -Headers $downloadHeaders -UseBasicParsing
            } else {
              $params = @{Uri = $Uri}
              if ($OutFile)         { $params.OutFile = $OutFile }
              if ($UseBasicParsing) { $params.UseBasicParsing = $true }
              Microsoft.PowerShell.Utility\Invoke-WebRequest @params
            }
          }
          & "$env:CLAUDE_PLUGIN_ROOT\scripts\bootstrap.ps1"

      # Bootstrap silently exits 0 in several no-op cases (e.g., the
      # path-glob safety check). Without an explicit post-condition the
      # job could green-light an install that didn't actually happen,
      # so we assert the binary landed at the expected path with the
      # right stamp.
      - name: Verify install artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="$CLAUDE_PLUGIN_ROOT/${{ matrix.binary }}"
          test -f "$BIN" || { echo "binary missing: $BIN"; exit 1; }
          test -x "$BIN" || { echo "binary not executable: $BIN"; exit 1; }
          STAMP=$(cat "$CLAUDE_PLUGIN_ROOT/.bootstrap-version")
          if [ "$STAMP" != "${{ steps.version.outputs.version }}" ]; then
            echo "bootstrap stamp mismatch: '$STAMP' != '${{ steps.version.outputs.version }}'"
            exit 1
          fi
          file "$BIN"

      - name: Verify install artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Join-Path $env:CLAUDE_PLUGIN_ROOT "${{ matrix.binary }}"
          if (-not (Test-Path $bin)) { Write-Error "binary missing: $bin"; exit 1 }
          $stampPath = Join-Path $env:CLAUDE_PLUGIN_ROOT ".bootstrap-version"
          $stamp = (Get-Content -Raw $stampPath).Trim()
          if ($stamp -ne "${{ steps.version.outputs.version }}") {
            Write-Error "bootstrap stamp mismatch: '$stamp' != '${{ steps.version.outputs.version }}'"
            exit 1
          }
          Write-Host "binary at $bin"

      # Idempotency: every Claude Code session start re-runs the bootstrap
      # hook. The script must short-circuit when the stamp matches; if it
      # re-downloads the binary on every session, the first prompt after
      # opening Claude is needlessly slow. We assert the second run emits
      # no "fetching" log line — that string only appears when bootstrap
      # actually calls curl/Invoke-WebRequest. No auth shim required: the
      # second run shouldn't hit the network at all.
      - name: Re-run bootstrap, assert idempotent (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          OUT=$(sh "$CLAUDE_PLUGIN_ROOT/scripts/bootstrap.sh" 2>&1 || true)
          echo "$OUT"
          if echo "$OUT" | grep -q "fetching"; then
            echo "FAIL: second bootstrap re-downloaded; stamp short-circuit is broken"
            exit 1
          fi
          echo "PASS: bootstrap is idempotent"

      - name: Re-run bootstrap, assert idempotent (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = & "$env:CLAUDE_PLUGIN_ROOT\scripts\bootstrap.ps1" 2>&1 | Out-String
          Write-Host $out
          if ($out -match 'fetching') {
            Write-Error "FAIL: second bootstrap re-downloaded; stamp short-circuit is broken"
            exit 1
          }
          Write-Host "PASS: bootstrap is idempotent"

      # Pre-grant accessibility for the binary before the launch step so
      # the macOS launch exercises the granted-permission path (which is
      # what a real user has after the System Settings prompt) rather
      # than the prompt path. Without this, the launch test passes for
      # the wrong reason — the binary stays alive waiting for an AX
      # decision that never comes in headless CI.
      #
      # Implementation: direct injection into the system TCC.db. The
      # GitHub-hosted macos-14 runner runs with SIP enabled, but TCC's
      # own protection doesn't extend to root-owned writes via sqlite3
      # on this database file on Sonoma. Schema is current as of macOS
      # 14; Apple changes the access table layout periodically, so this
      # step is expected to need touch-ups when the runner image is
      # bumped to a newer macOS major.
      - name: Pre-grant accessibility (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BIN="$CLAUDE_PLUGIN_ROOT/${{ matrix.binary }}"
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          sudo sqlite3 "$TCC_DB" <<EOF
          INSERT OR REPLACE INTO access
            (service, client, client_type, auth_value, auth_reason,
             auth_version, csreq, policy_id,
             indirect_object_identifier_type, indirect_object_identifier,
             indirect_object_code_identity, flags, last_modified)
          VALUES
            ('kTCCServiceAccessibility', '$BIN', 1, 2, 4, 1,
             NULL, NULL, 0, 'UNUSED', NULL, 0,
             strftime('%s','now'));
          EOF
          echo "TCC row written, verifying..."
          sudo sqlite3 "$TCC_DB" \
            "SELECT service, client, auth_value FROM access WHERE service='kTCCServiceAccessibility' AND client='$BIN';"

      # Launch the binary and confirm it doesn't crash within ~6s.
      # Tauri startup involves loading the WebKit/WebView2 runtime,
      # accessibility APIs, and the window manager — any missing dylib
      # or runtime mismatch surfaces here. We treat both "still alive
      # after 6s" and "exited cleanly with code 0" as success; only a
      # non-zero exit or signal counts as failure.
      - name: Launch the binary (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          BIN="$CLAUDE_PLUGIN_ROOT/${{ matrix.binary }}"
          xvfb-run -a "$BIN" >launch.log 2>&1 &
          pid=$!
          sleep 6
          if kill -0 $pid 2>/dev/null; then
            echo "binary alive after 6s — pass"
            sed -n '1,80p' launch.log || true
            kill $pid 2>/dev/null || true
            wait $pid 2>/dev/null || true
            exit 0
          fi
          wait $pid
          status=$?
          echo "binary exited within 6s with status=$status"
          sed -n '1,80p' launch.log || true
          [ "$status" -eq 0 ] && exit 0 || exit 1

      - name: Launch the binary (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BIN="$CLAUDE_PLUGIN_ROOT/${{ matrix.binary }}"
          "$BIN" >launch.log 2>&1 &
          pid=$!
          sleep 6
          if kill -0 $pid 2>/dev/null; then
            echo "binary alive after 6s — pass"
            sed -n '1,80p' launch.log || true
            kill $pid 2>/dev/null || true
            wait $pid 2>/dev/null || true
            exit 0
          fi
          wait $pid
          status=$?
          echo "binary exited within 6s with status=$status"
          sed -n '1,80p' launch.log || true
          [ "$status" -eq 0 ] && exit 0 || exit 1

      - name: Launch the binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Join-Path $env:CLAUDE_PLUGIN_ROOT "${{ matrix.binary }}"
          $p = Start-Process -FilePath $bin -PassThru `
            -RedirectStandardOutput launch.log `
            -RedirectStandardError launch.err
          Start-Sleep -Seconds 6
          if (-not $p.HasExited) {
            Write-Host "binary alive after 6s — pass"
            if (Test-Path launch.log) { Get-Content launch.log | Select-Object -First 80 }
            if (Test-Path launch.err) { Get-Content launch.err | Select-Object -First 80 }
            Stop-Process -Id $p.Id -Force
            exit 0
          }
          Write-Host "binary exited within 6s with code=$($p.ExitCode)"
          if (Test-Path launch.log) { Get-Content launch.log | Select-Object -First 80 }
          if (Test-Path launch.err) { Get-Content launch.err | Select-Object -First 80 }
          if ($p.ExitCode -eq 0) { exit 0 } else { exit 1 }

  # ──────────────────────────────────────────────────────────────────
  # Tier 1B — GNOME extension static validation (Linux, always runs)
  #
  # Catches the realistic failure modes of the helper extension: JS
  # syntax errors, malformed metadata.json, broken gschema XML. These
  # surface only inside a real Mutter session today, which means a typo
  # ships and breaks every Linux user's activation chord until someone
  # logs out / back in and reads the journal. The static-only checks
  # below run in <5 seconds with zero flake risk.
  gnome-extension-check:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    name: gnome-extension static checks
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.event.workflow_run.head_sha || github.sha }}

      - name: Install glib2 (for glib-compile-schemas)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin

      - name: Check extension.js JS syntax
        # node --check parses but does not execute; catches plain JS
        # syntax errors. extension.js uses GJS-specific globals
        # (imports.gi.*) which aren't defined in Node, but those resolve
        # at runtime not parse time, so --check is the right tool here.
        run: node --check gnome-extension/extension.js

      - name: Validate metadata.json shape
        # Confirms the file parses as JSON and has the required fields
        # GNOME Shell looks up when loading an extension.
        run: |
          python3 - <<'PY'
          import json, sys, pathlib
          meta = json.loads(pathlib.Path("gnome-extension/metadata.json").read_text())
          required = {"uuid", "name", "shell-version"}
          missing = required - set(meta.keys())
          if missing:
              print(f"metadata.json missing required keys: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"metadata.json OK — uuid={meta['uuid']}, shell-version={meta['shell-version']}")
          PY

      - name: Compile gschema (catch XML / type errors)
        # --strict promotes warnings to errors so a typo in <key> or
        # <enum> fails the build instead of silently producing a
        # mis-compiled schema users would only notice on first launch.
        run: glib-compile-schemas --strict gnome-extension/schemas

  # ──────────────────────────────────────────────────────────────────
  # Tier 2 — Claude Code-driven install: NOT IMPLEMENTED
  #
  # Original plan: install Claude Code CLI in CI, run
  #   claude -p "/plugin marketplace add heikki-laitala/stick-around"
  #   claude -p "/plugin install stick-around@stick-around"
  # and assert the cache layout matches what the existing rsync
  # stand-in produces.
  #
  # Spike result: Claude Code's `-p` (non-interactive print mode) does
  # NOT support the `/plugin` family of commands. The CLI responds
  # with the literal string "/plugin isn't available in this
  # environment." and exits 0, so we can't drive the install flow
  # this way today. Pure-API alternatives would require shimming the
  # plugin manager's internals, which trades the test fidelity
  # benefit for tight coupling to undocumented surface area.
  #
  # Until Claude Code grows non-interactive plugin commands the
  # rsync-based source mirror in the smoke-test job (above) is the
  # most faithful stand-in available, and it already covers
  # everything downstream of /plugin install. Re-revisit when the
  # CLI surface changes.

  # ──────────────────────────────────────────────────────────────────
  # Tier 3 — GNOME extension load in a nested Mutter session
  #          (extended only)
  #
  # Static checks (Tier 1B above) catch parse-time errors; this job
  # catches load-time errors — failures inside the JS that only fire
  # once GNOME Shell actually imports the extension and calls its
  # enable() hook (missing GIR bindings, wrong gschema id, runtime
  # exceptions in module top-level code).
  #
  # Implementation: install gnome-shell, run it nested on top of an
  # Xvfb display, copy the extension into the user's extensions dir,
  # enable it, and parse the journal for load errors. Known fragile:
  # gnome-shell --nested has historically required a real Wayland
  # session and falls over in container environments. Treat the first
  # green run as ground truth; if it flakes, fall back to skipping.
  gnome-extension-runtime:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.extended }}
    runs-on: ubuntu-latest
    name: gnome-extension runtime load
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.event.workflow_run.head_sha || github.sha }}

      - name: Install gnome-shell + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gnome-shell \
            mutter \
            xvfb \
            dbus-x11 \
            libglib2.0-bin

      - name: Install extension into user's extensions dir
        run: |
          UUID="stick-around@stickaround.dev"
          DEST="$HOME/.local/share/gnome-shell/extensions/$UUID"
          mkdir -p "$DEST/schemas"
          cp gnome-extension/extension.js "$DEST/"
          cp gnome-extension/metadata.json "$DEST/"
          cp gnome-extension/schemas/*.gschema.xml "$DEST/schemas/"
          glib-compile-schemas "$DEST/schemas"

      - name: Start Xvfb + nested gnome-shell, enable extension
        # Best-effort. gnome-shell --nested expects a real session
        # manager and Wayland infrastructure that ephemeral CI runners
        # don't always provide; if the shell can't start we report
        # SKIPPED and exit 0 rather than false-positive PASS. The
        # XDG_RUNTIME_DIR setup is required — without it Mutter dies
        # immediately with "Failed to create socket".
        run: |
          set +e
          export DISPLAY=:99
          export XDG_RUNTIME_DIR="$(mktemp -d /tmp/xdg-runtime.XXXXXX)"
          chmod 700 "$XDG_RUNTIME_DIR"

          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          sleep 2

          # Start a session bus and export DBUS_SESSION_BUS_ADDRESS
          # into THIS shell so gnome-shell, the readiness probe, and
          # `gnome-extensions enable` all hit the same bus.
          # The previous form (`dbus-launch --exit-with-session
          # gnome-shell ...`) confined the bus to gnome-shell's
          # process tree, leaving the parent shell on a different bus
          # and causing the probe to systematically time out even
          # when the shell was alive.
          eval "$(dbus-launch --sh-syntax)"

          # Launch nested gnome-shell against the exported bus.
          gnome-shell --nested --no-x11 \
            >/tmp/gnome-shell.log 2>&1 &
          SHELL_PID=$!

          cleanup() {
            kill "$SHELL_PID" "$XVFB_PID" "${DBUS_SESSION_BUS_PID:-0}" 2>/dev/null || true
          }
          shell_alive() { kill -0 "$SHELL_PID" 2>/dev/null; }

          skip_unhealthy() {
            local reason="$1"
            echo "SKIPPED: $reason"
            echo "--- gnome-shell.log (last 80 lines) ---"
            tail -n 80 /tmp/gnome-shell.log || true
            cleanup
            # Exit 0 — environment couldn't host the test, not a code
            # failure. Tier 1B (static checks) still ran and caught
            # the realistic load-time errors.
            exit 0
          }

          # Give it up to 15s to come up. A live shell registers
          # org.gnome.Shell on the session bus AND its process is
          # still alive. The latter check matters because gnome-shell
          # on some kernels registers its bus name early then crashes
          # mid-initialization with a Gio.IOErrorEnum; without the
          # process check we'd catch the brief alive window and then
          # run `enable` / `info` against a dead shell.
          STARTED=0
          for i in $(seq 1 15); do
            if dbus-send --session --dest=org.gnome.Shell --print-reply \
                 /org/gnome/Shell org.freedesktop.DBus.Peer.Ping >/dev/null 2>&1 \
               && shell_alive; then
              STARTED=1
              break
            fi
            sleep 1
          done

          if [ "$STARTED" -eq 0 ]; then
            skip_unhealthy "gnome-shell --nested did not come up in this environment."
          fi

          # Shell is up — every check past this point is a hard
          # pass/fail UNLESS the shell crashes between checks (which
          # is an environment failure, not a code regression).
          if ! shell_alive; then
            skip_unhealthy "gnome-shell exited between readiness probe and enable."
          fi

          if ! gnome-extensions enable stick-around@stickaround.dev; then
            if ! shell_alive; then
              skip_unhealthy "gnome-shell exited during enable."
            fi
            echo "FAIL: gnome-extensions enable returned non-zero against a live shell."
            echo "--- gnome-shell.log (last 80 lines) ---"
            tail -n 80 /tmp/gnome-shell.log || true
            cleanup
            exit 1
          fi
          sleep 3

          if ! shell_alive; then
            skip_unhealthy "gnome-shell exited after enable but before state check."
          fi

          # Confirm the runtime state, not just the desired state.
          # `info` reports `State: <NAME>`; ACTIVE and ENABLED both
          # mean the extension is loaded successfully. Any other
          # value (ERROR, INITIALIZED stuck, OUT_OF_DATE, …) is a
          # failure.
          STATE=$(gnome-extensions info stick-around@stickaround.dev 2>/dev/null \
            | awk -F': *' '/^State:/ {print $2}')
          case "$STATE" in
            ACTIVE|ENABLED) ;;
            *)
              if ! shell_alive; then
                skip_unhealthy "gnome-shell exited during state inspection (empty State output)."
              fi
              echo "FAIL: extension state is '$STATE', expected ACTIVE or ENABLED."
              echo "--- gnome-shell.log (last 80 lines) ---"
              tail -n 80 /tmp/gnome-shell.log || true
              cleanup
              exit 1
              ;;
          esac

          echo "--- gnome-shell.log (last 120 lines) ---"
          tail -n 120 /tmp/gnome-shell.log || true

          # Final pass: even with State=ACTIVE, a top-level JS error
          # traced to our extension during load is a regression.
          if grep -E "stick-around.*(Error|Exception|TypeError|ReferenceError)" /tmp/gnome-shell.log; then
            echo "FAIL: extension load produced JS errors"
            cleanup
            exit 1
          fi

          cleanup
          echo "PASS: extension loaded under live gnome-shell with State=$STATE and no JS errors"
